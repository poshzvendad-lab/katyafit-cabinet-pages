                // [подпись, строки Конструктора, «такой белок уже в блюде» (не предлагать), слоты: b(завтрак)/l(обед)/d(ужин)]
                // Обед — с плотным гарниром, ужин — лёгкий белок + овощи (овощи
                // не считаем, в items только белок и масло) — «ПРАВИЛО ПРИЁМОВ».
                const COMBOS = [
                    ['Курица + гречка', ['Куриное филе / индейка', 'Гречка / бурый рис'], /кури|индей/i, 'l'],
                    ['Треска + картофель + масло', ['Белая рыба (треска, минтай)', 'Картофель', 'Растительное масло (оливковое/подсолнечное)'], /рыб|треск|минтай|горбуш|кета/i, 'l'],
                    ['Говядина + перловка', ['Постная говядина', 'Перловка / пшено'], /говя/i, 'l'],
                    ['Креветки + макароны', ['Креветки / кальмары', 'Макароны из твёрдых сортов'], /кревет|кальмар|морепрод/i, 'l'],
                    ['Творог + орехи', ['Творог 2–5%', 'Орехи (грецкие, миндаль)'], /творо|сырник|запеканк/i, 'bd'],
                    ['Яйца + цельнозерновой хлеб', ['Куриные яйца', 'Хлеб цельнозерновой / ржаной'], /яйц|яиц|омлет|скрембл|овсяноблин/i, 'b'],
                    ['Овсянка + яйца', ['Овсяные хлопья', 'Куриные яйца'], /овся|каша/i, 'b'],
                    ['Курица + овощи с маслом', ['Куриное филе / индейка', 'Растительное масло (оливковое/подсолнечное)'], /кури|индей/i, 'd'],
                    ['Треска + овощи с маслом', ['Белая рыба (треска, минтай)', 'Растительное масло (оливковое/подсолнечное)'], /рыб|треск|минтай|горбуш|кета/i, 'd'],
                    ['Креветки + овощи с маслом', ['Креветки / кальмары', 'Растительное масло (оливковое/подсолнечное)'], /кревет|кальмар|морепрод/i, 'd'],
                ];
                const q = {};
                plan.meals.forEach((m, i) => {
                    if (m.p == null || m.treat) return; // читмил/«собери сам»/перекус — без комбо
                    const kc = mealKcal(m);
                    const slot = /завтрак/i.test(m.slot) ? 'b' : (/ужин/i.test(m.slot) ? 'd' : 'l');
                    const pool = COMBOS
                        .filter(c => c[3].indexOf(slot) !== -1 && !c[2].test(m.text))
                        .map(c => {
                            const rs = c[1].map(nm => rowByName[nm]);
                            if (rs.some(r => !r)) return null;
                            return { label: c[0], kcal: rs.reduce((s, r) => s + r.kcal, 0), items: rs.map(item) };
                        })
                        .filter(Boolean);
                    pool.sort((a, b) => Math.abs(a.kcal - kc) - Math.abs(b.kcal - kc));
                    if (pool.length) q[i] = pool.slice(0, 3);
                });
                return q;
            }

            // ─── «Что готовить завтра» — меню следующего дня одной строкой ───
            // Чтобы с вечера разморозить мясо / замочить крупу. Только в рамках
            // тарифа (меню платных дней триалу не светим) и пока есть день N+1.
            function tomorrowHtml() {
                if (typeof nutritionDay !== 'function') return '';
                const nd = N + 1;
                if (nd > 28 || nd > KF.tierMaxDay()) return '';
                const p2 = nutritionDay(nd);
                if (!p2) return '';
                let rows = '';
                p2.meals.forEach(m => {
                    const kc = mealKcal(m);
                    const nm = m.cheat ? 'Свободный приём — читмил'
                        : (m.diy ? 'Собери сам из таблиц' : mealShortName(m.text));
                    rows += '<li><span class="tmrw__slot">' + escapeHtml(m.slot) + '</span>' +
                        '<span class="tmrw__name">' + escapeHtml(nm) + '</span>' +
                        (kc ? '<span class="tmrw__k">' + kc + ' ккал</span>' : '') + '</li>';
                });
                // Продукты на завтра с весом (просьба владельца 11.07.2026): ключевые
                // продукты из items, просуммированные по приёмам дня, вес — СЫРОЙ/СУХОЙ
                // (как покупать и взвешивать; тот же rawFromCooked, что и списки недели).
                // Овощи/яйца/молочное в items не выносятся — о них note ниже.
                const prods = [];
                p2.meals.forEach(m => {
                    if (m.cheat) return;
                    (m.items || []).forEach(it => {
                        const raw = rawFromCooked(it.g, it.k);
                        const name = it.n.replace(/\s*\([^)]*\)/g, '').trim();
                        const dry = !!it.k && it.k > 1;
                        const hit = prods.find(p => p.name === name && p.dry === dry);
                        if (hit) hit.raw += raw; else prods.push({ name: name, raw: raw, dry: dry });
                    });
                });
                let shopHtml = '';
                if (prods.length) {
                    let li = '';
                    prods.forEach(p => {
                        li += '<li><span>' + escapeHtml(p.name) + '</span><b>' + p.raw + ' г ' + (p.dry ? 'сухой' : 'сырой') + '</b></li>';
                    });
                    shopHtml = '<div class="tmrw__shop"><div class="tmrw__shop-h">Продукты на завтра</div>' +
                        '<ul>' + li + '</ul>' +
                        '<p class="tmrw__shop-note">Вес — сырых продуктов и сухих круп: столько взвесить до готовки. Овощи, яйца и молочное здесь не выписаны — они уже есть в списке покупок недели на главной странице.</p></div>';
                }
                // Советы подготовки: мясо/рыба (k ≤ 0.8 — картофель 0.83 не считается)
                // → разморозить; перловка варится долго → замочить.
                const hasMeat = p2.meals.some(m => (m.items || []).some(it => it.k && it.k <= 0.8));
                const soak = p2.meals.some(m => /перловк/i.test(m.text));
                let tips = '';
                if (hasMeat) tips += 'достань мясо/рыбу из морозилки с вечера';
                if (soak) tips += (tips ? '; ' : '') + 'перловку можно замочить на ночь — сварится быстрее';
                const IC_PAN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 11.5h15v3.5a4 4 0 0 1-4 4h-7a4 4 0 0 1-4-4z"/><path d="M2.5 11.5h19"/><path d="M9.5 8.2c0-1.1.9-1.1.9-2.2M13.6 8.2c0-1.1.9-1.1.9-2.2"/></svg>';
                return '<details class="tmrw"><summary><span class="ic">' + IC_PAN + '</span>Что готовить завтра · день ' + nd + '</summary>' +
                    '<div class="tmrw__body"><ul class="tmrw__list">' + rows + '</ul>' + shopHtml +
                    (tips ? '<p class="tmrw__tip">Подготовка: ' + tips + '.</p>' : '') +
                    '</div></details>';
            }

            // «Свой продукт» — СВОЯ шторка над таблицами замен (просьба владельца
            // 10.07.2026: «это как бы отдельно»): съела то, чего нет в таблицах
            // (борщ у мамы, кафе) — вписала ккал (Б/Ж/У по желанию), попало в счёт
            // как обычная строка Конструктора: добор или замена, персист со счётом.
            function renderCustom(addable) {
                if (!addable) return '';
                return '<details class="con"><summary>Свой продукт</summary>' +
                    '<p class="con__intro">Съела что-то не из плана? Впиши сюда — попадёт в дневной счёт.</p>' +
                    '<form class="con-custom" data-custom-form novalidate>' +
                        '<input type="text" class="cc-name" data-cc-name maxlength="60" placeholder="Например: борщ, 1 тарелка">' +
                        '<div class="cc-nums">' +
                            '<label><span>ккал</span><input type="number" inputmode="decimal" min="1" max="3000" data-cc-kcal placeholder="—"></label>' +
                            '<label><span>Б, г</span><input type="number" inputmode="decimal" min="0" max="300" data-cc-p placeholder="0"></label>' +
                            '<label><span>Ж, г</span><input type="number" inputmode="decimal" min="0" max="300" data-cc-f placeholder="0"></label>' +
                            '<label><span>У, г</span><input type="number" inputmode="decimal" min="0" max="300" data-cc-c placeholder="0"></label>' +
                        '</div>' +
                        '<p class="cc-hint">Калории смотри на упаковке продукта; для домашних блюд впиши примерно. Белки, жиры и углеводы — по желанию.</p>' +
                        '<p class="sheet-err" data-cc-err hidden>Впиши калории — без них не посчитаем.</p>' +
                        '<button type="submit" class="btn btn--gold cc-add">Добавить в счёт</button>' +
                    '</form></details>';
            }

            // Раскрывающийся Мастер-Конструктор 80/20 — таблицы замен + слот «Вкусняшки».
            // addable — есть ли бюджет (анкета заполнена): тогда строки кликабельны и
            // добавляют свои ккал/Б-Ж-У в дневной счёт (добор); иначе просто справка.
            function renderConstructor(addable) {
                const con = nutritionConstructor(), treats = nutritionTreats();
                if (!con) return '';

                // Первое число диапазона («40–45 г» → 40), чтобы понять направление
                // изменения веса при готовке.
                const firstNum = s => { const m = String(s).match(/\d+/); return m ? +m[0] : null; };

                // Строка веса одной строкой во всю ширину карточки: продукт, меняющий
                // вес, показывает сырой/сухой (по нему взвешивать и считать) + бледно
                // «· ≈ N г готового». Продукт без изменения веса (raw без cooked) —
                // один вес. Состояние сырой/сухой выводим из направления: cooked > raw
                // → сухой (крупы), иначе сырой (мясо/рыба) — так картофель не «сухой».
                function weightLine(raw, cooked) {
                    if (!raw) return escapeHtml(cooked);
                    if (!cooked || cooked === raw) return escapeHtml(raw);
                    const rw = firstNum(raw), cw = firstNum(cooked);
                    const state = (rw != null && cw != null && cw > rw) ? 'сухой' : 'сырой';
                    return escapeHtml(raw) + ' <i>' + state + '</i>' +
                        '<span class="ci-wsub"> · ≈ ' + escapeHtml(cooked) + ' готового</span>';
                }
                // Строку можно тапнуть, чтобы добавить её в дневной счёт (только если есть бюджет).
                // raw/cooked уезжают в item — блок замены покажет граммовку порции.
                function rowAttrs(r) {
                    if (!addable) return ' class="con-item"';
                    const raw = r.raw || r.w || '', cooked = r.cooked || '';
                    return ' class="con-item con-row" role="button" tabindex="0" data-add-food' +
                        ' data-name="' + escapeHtml(r.n) + '" data-kcal="' + r.kcal +
                        '" data-p="' + r.p + '" data-f="' + r.f + '" data-c="' + r.c +
                        '" data-raw="' + escapeHtml(raw) + '" data-cooked="' + escapeHtml(cooked) + '"';
                }
                // Одна карточка-строка: имя + ккал на первой строке (все строки одной
                // высоты), вес — отдельной строкой во всю ширину (раньше вес, пометка
                // и ккал стопкой теснились в узкой правой колонке — список был рваным).
                function rowHtml(r, wline) {
                    return '<div' + rowAttrs(r) + '><div class="ci-top">' +
                        '<span class="ci-name">' + escapeHtml(r.n) + '</span>' +
                        '<span class="ci-kcal">≈ ' + r.kcal + ' ккал' +
                        (addable ? ' <span class="con-add" aria-hidden="true">＋</span>' : '') + '</span></div>' +
                        '<div class="ci-w">' + wline + '</div></div>';
                }

                // Группы — свёрнутые шторки (одна простыня из 4 таблиц перегружала):
                // открываешь только нужную.
                // Продукты внутри группы — ПО АЛФАВИТУ (просьба владельца 09.07.2026):
                // ищешь глазами, а не сканируешь весь список. Данные не трогаем —
                // сортируем копию при рендере.
                const byAbc = (a, b) => a.n.localeCompare(b.n, 'ru');
                let groups = '';
                con.groups.forEach(g => {
                    let body = '';
                    g.rows.slice().sort(byAbc).forEach(r => {
                        body += rowHtml(r, weightLine(r.raw, r.cooked));
                    });
                    groups += '<details class="con-g"><summary class="con-group__h">' + escapeHtml(g.title) +
                        '<span>' + escapeHtml(g.note) + '</span></summary>' +
                        '<div class="con-list">' + body + '</div></details>';
                });
                // Вкусняшки — вес не меняется: одна порция строкой под именем.
                let treatsHtml = '';
                (treats ? treats.rows.slice().sort(byAbc) : []).forEach(r => {
                    treatsHtml += rowHtml(r, escapeHtml(r.w));
                });
                // Вступление + легенда двойного веса — за раскрывашкой (просьба
                // владельца 10.07.2026): по умолчанию сразу таблицы, ликбез по тапу.
                const conQa = '<div class="qa-wrap">' + qaHtml('Как пользоваться заменами?',
                    '<p><b>Зачем эти таблицы.</b> ' + escapeHtml(con.intro) + '</p>' +
                    (addable
                        ? '<p><b>Добавить к счёту дня.</b> Нажми на любую строку — её калории добавятся в счёт. Так удобно добирать разницу между планом (около 1200 ккал) и твоей личной нормой.</p>' +
                          '<p><b>Заменить блюдо.</b> Открой блюдо в плане и нажми «Заменить»: можно взять готовый вариант или собрать свою замену по шагам — белок, гарнир, жир. У собранной замены будет своя кнопка «Рецепт».</p>'
                        : '<p><b>Замена.</b> Любое блюдо плана можно заменить равной порцией из этих таблиц: одна строка ≈ одна порция плана.</p>') +
                    '<p><b>Как понимать вес.</b> Крупная цифра — вес <b>сырого</b> продукта (мясо, рыба) или <b>сухой</b> крупы: столько нужно взвесить до готовки. Мелким серым рядом — сколько примерно получится в готовом виде.</p>' +
                    '<p><b>Порции равноценные.</b> В таблице «Белки» каждая строка даёт ≈ 25–30 г белка, в «Сложных углеводах» ≈ 28–37 г углеводов, в «Полезных жирах» ≈ 10–12 г жиров. Поэтому меняй строку на строку из той же таблицы.</p>' +
                    '<p><b>Готовь без жарки в масле</b> — вари, запекай или туши, тогда калории совпадут с таблицей.</p>') + '</div>';
                // ⚠️ Внешний <details class="con"> обязан закрыться здесь же: без
                // </details> он проглатывал следующие блоки секции («Что готовить
                // завтра» был невидим, пока не раскроешь Конструктор).
                // data-con-tables: шторок .con теперь две («Свой продукт» + таблицы) —
                // кнопки «→ таблицы замен» (data-con-jump) целятся именно в таблицы.
                return '<details class="con" data-con-tables><summary>Замены и вкусняшки</summary>' +
                    conQa +
                    groups +
                    '<details class="con-g con-g--treat"><summary class="con-group__h">🔥 Вкусняшки<span>слот 20% · до 150–200 ккал</span></summary>' +
                    '<p class="con__intro con__intro--treat">' + escapeHtml(treats ? treats.note : '') + '</p>' +
                    '<div class="con-list">' + treatsHtml + '</div></details>' +
                    '</details>';
            }

            // ─── Флоу завершения дня ───
            function initFinishFlow() {
                let mood = null;
                const steps = {
                    mood: sheet.querySelector('[data-step="mood"]'),
                    done: sheet.querySelector('[data-step="done"]'),
                };

                function showStep(name) {
                    Object.entries(steps).forEach(([k, el]) => el.hidden = (k !== name));
                }
                function openSheet() {
                    // сводка привычек
                    const total = d.habits.length, checked = KF.habitsChecked(N, total);
                    sheet.querySelector('[data-habit-summary]').innerHTML =
                        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8.5 12.2l2.4 2.4 4.6-4.8"/></svg>' +
                        '<span>Задачи дня: <b>' + checked + ' из ' + total + '</b> отмечено</span>';
                    // Сводка питания — только если участница вела счёт (что-то отмечено
                    // или добрано); пустой счёт не показываем, чтобы не укорять.
                    const ns = sheet.querySelector('[data-nutri-summary]');
                    if (ns) {
                        const used = nutri && nutri.t && (Object.keys(nutri.eaten).length || nutri.added.length);
                        if (used) {
                            const e = nutriEaten();
                            const left = nutri.t.kcal - e.k;
                            ns.innerHTML =
                                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3v6.5a2.5 2.5 0 0 0 2.5 2.5 2.5 2.5 0 0 0 2.5-2.5V3"/><path d="M7.5 12v9"/><path d="M16.5 21V3"/><path d="M16.5 3c2 1 2 6 0 7.5"/></svg>' +
                                '<span>Питание: ≈ <b>' + e.k + ' ккал</b>' +
                                (left >= 0 ? ' — в бюджете' : ' — чуть выше бюджета') + '</span>';
                        }
                        ns.hidden = !used;
                    }
                    showStep('mood');
                    sheet.classList.add('open');
                    document.body.style.overflow = 'hidden';
                }
                function closeSheet() { sheet.classList.remove('open'); document.body.style.overflow = ''; }

                document.querySelector('[data-open-finish]').addEventListener('click', openSheet);
                sheet.querySelector('[data-sheet-close]').addEventListener('click', closeSheet);
                sheet.addEventListener('click', (e) => { if (e.target === sheet) closeSheet(); });
                document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && sheet.classList.contains('open')) closeSheet(); });

                // Настроение выбрано → сразу засчитываем день (фото переехало в замеры).
                sheet.querySelectorAll('.mood-opt').forEach(btn => {
                    btn.addEventListener('click', () => {
                        if (finishing) return;
                        sheet.querySelectorAll('.mood-opt').forEach(b => b.classList.remove('sel'));
                        btn.classList.add('sel');
                        mood = btn.dataset.mood;
                        setTimeout(finishDay, 220);
                    });
                });

                const finishErr = sheet.querySelector('[data-finish-err]');
                let finishing = false;
                async function finishDay() {
                    if (finishing) return;          // защита от двойного нажатия
                    finishing = true;
                    finishErr.hidden = true;
                    const res = await KF.completeDay(N, { mood });
                    if (!res || !res.ok) {
                        finishing = false;
                        finishErr.hidden = false;
                        finishErr.textContent = (res && res.reason === 'auth')
                            ? 'Не удалось сохранить — сессия входа истекла. Закрой окно, нажми «Выйти» и зайди заново по коду из письма.'
                            : 'Не удалось сохранить день — проверь интернет и попробуй ещё раз.';
                        return;
                    }
                    const next = N + 1;
                    if (next > 28) {
                        steps.done.querySelector('[data-done-title]').textContent = 'Программа пройдена! 🎉';
                        steps.done.querySelector('[data-done-text]').textContent = 'Все 28 дней позади. Ты большая молодец!';
                    } else if (next > KF.tierMaxDay()) {
                        // Пробный доступ исчерпан (завершён последний доступный день) → стена.
                        steps.done.querySelector('[data-done-title]').textContent = 'Пробные дни пройдены! 🎉';
                        steps.done.querySelector('[data-done-text]').textContent = 'Ты попробовала программу. Дальше — все 28 дней с тренировками и питанием. Открой полный доступ, чтобы продолжить.';
                    } else {
                        // День next теперь открыт (progress_day сдвинулся) — берём его заголовок
                        // с сервера. Таймаут как у загрузки дня (0.6.60): зависший запрос не должен
                        // держать шторку на шаге настроения — день-то уже засчитан.
                        const nd = await Promise.race([
                            KF.getDay(next).catch(() => null),
                            new Promise(res => setTimeout(() => res(null), 8000)),
                        ]);
                        const tail = nd ? (' — ' + nd.title) : '';
                        steps.done.querySelector('[data-done-title]').textContent = 'День ' + N + ' завершён!';
                        steps.done.querySelector('[data-done-text]').textContent = 'Открыт День ' + next + tail + '. Возвращайся завтра 💛';
                    }
                    showStep('done');
                    cta.hidden = true;
                }
            }
        })();
    </script>
</body>
</html>
